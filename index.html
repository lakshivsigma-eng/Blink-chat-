<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Blink Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0d14;--surface:#13131f;--surface2:#1c1c2e;--border:#252538;--accent:#7c6fff;--accent2:#ff6fb0;--text:#e2e2f0;--text2:#7878a0;--green:#3effa0}
html,body{height:100%;width:100%;overflow:hidden;font-family:'Syne',sans-serif;background:var(--bg);color:var(--text)}

/* SCREENS */
.screen{display:none;position:fixed;inset:0}
.screen.active{display:flex}

/* GATE */
#gate-screen{align-items:center;justify-content:center;background:var(--bg);flex-direction:column}
.gate-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 30px;width:90%;max-width:380px;text-align:center}
.logo{font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
.sub{color:var(--text2);font-size:.85rem;margin-bottom:28px}
.big-input{width:100%;background:var(--surface2);border:2px solid var(--border);border-radius:12px;padding:14px;color:var(--text);font-family:'Syne',sans-serif;font-size:1.1rem;text-align:center;outline:none;letter-spacing:3px;margin-bottom:10px}
.big-input:focus{border-color:var(--accent)}
.err{color:#ff4f6f;font-size:.82rem;min-height:18px;margin-bottom:10px}
.btn{width:100%;background:linear-gradient(135deg,var(--accent),#a06fff);border:none;border-radius:12px;padding:15px;color:#fff;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;cursor:pointer}

/* AUTH */
#auth-screen{align-items:center;justify-content:center;background:var(--bg);flex-direction:column}

/* APP */
#app-screen{flex-direction:row}

/* SIDEBAR */
#sidebar{width:280px;min-width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100%;transition:transform .25s;z-index:10}
.sid-top{padding:16px;border-bottom:1px solid var(--border)}
.brand{font-size:1.3rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px}
.profile{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:.9rem;flex-shrink:0}
.av-name{flex:1;overflow:hidden}
.av-label{font-size:.7rem;color:var(--text2)}
.av-val{font-weight:700;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.leave-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text2);font-family:'Syne',sans-serif;font-size:.75rem;padding:5px 10px;cursor:pointer;white-space:nowrap}
.search{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'Syne',sans-serif;font-size:.9rem;outline:none}
.search:focus{border-color:var(--accent)}
.search-wrap{padding:10px 16px;border-bottom:1px solid var(--border)}
#users-list{flex:1;overflow-y:auto;padding:8px}
.user-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;cursor:pointer;transition:background .15s}
.user-item:hover,.user-item:active{background:var(--surface2)}
.u-info{flex:1;overflow:hidden}
.u-name{font-weight:700;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dot{width:9px;height:9px;border-radius:50%;background:var(--border);flex-shrink:0}
.dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}
.empty{text-align:center;color:var(--text2);padding:24px;font-size:.85rem}
.sid-bot{padding:10px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.del-btn{background:none;border:1px solid #ff4f6f;border-radius:10px;color:#ff4f6f;font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;padding:10px;cursor:pointer}
.admin-btn{background:none;border:none;color:#ffffff10;font-size:.6rem;font-family:monospace;cursor:pointer;padding:4px;transition:color .3s}
.admin-btn:hover{color:#ff4f6f}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;height:100%;overflow:hidden;position:relative}
#chat-placeholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text2);gap:10px}
#chat-area{display:none;flex-direction:column;height:100%}
.chat-top{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.menu-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;width:42px;height:42px;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text)}
#chat-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}
#chat-nm{font-weight:700;font-size:1rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.call-btn-main{background:linear-gradient(135deg,#3effa0,#00c97a);border:none;border-radius:10px;padding:10px 14px;color:#000;font-family:'Syne',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;flex-shrink:0;white-space:nowrap}
#msgs{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;display:flex;flex-direction:column;gap:6px}
.input-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
#msg-in{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-family:'Syne',sans-serif;font-size:16px;outline:none}
#msg-in:focus{border-color:var(--accent)}
.send-btn{background:linear-gradient(135deg,var(--accent),#a06fff);border:none;border-radius:12px;width:46px;height:46px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.send-btn svg{fill:#fff}

/* OVERLAY */

#open-btn{display:none;position:fixed;bottom:90px;left:16px;z-index:200;background:var(--accent);border:none;border-radius:50%;width:54px;height:54px;font-size:1.4rem;cursor:pointer;box-shadow:0 4px 20px #7c6fff66;align-items:center;justify-content:center;color:#fff}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#ff4f6f;color:#fff;padding:12px 24px;border-radius:10px;font-size:.9rem;font-weight:600;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;z-index:9999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:640px){
  #sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);width:82vw}
  #sidebar.open{transform:translateX(0)}
  #open-btn{display:flex}
  #main{width:100vw}
}
</style>
</head>
<body>

<!-- GATE -->
<div id="gate-screen" class="screen active">
  <div class="gate-card">
    <div class="logo">Blink ⚡</div>
    <div class="sub">// enter password</div>
    <input id="gate-in" class="big-input" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')checkGate()">
    <div id="gate-err" class="err"></div>
    <button class="btn" onclick="checkGate()">Unlock →</button>
  </div>
</div>

<!-- AUTH -->
<div id="auth-screen" class="screen">
  <div class="gate-card">
    <div class="logo">Blink ⚡</div>
    <div class="sub">// what's your name?</div>
    <input id="name-in" class="big-input" type="text" placeholder="Your name" maxlength="20" style="letter-spacing:0" onkeydown="if(event.key==='Enter')joinChat()">
    <div style="height:10px"></div>
    <button class="btn" onclick="joinChat()">Join →</button>
  </div>
</div>

<!-- APP -->
<div id="app-screen" class="screen">
  <div id="sidebar">
    <div class="sid-top">
      <div class="brand">Blink ⚡</div>
      <div class="profile">
        <div class="av" id="my-av">?</div>
        <div class="av-name">
          <div class="av-label">chatting as</div>
          <div class="av-val" id="my-nm">...</div>
        </div>
        <button class="leave-btn" onclick="leaveChat()">Leave</button>
      </div>
    </div>
    <div class="search-wrap">
      <input class="search" id="search-in" type="text" placeholder="Search people…" oninput="filterUsers(this.value)">
    </div>
    <div id="users-list"><div class="empty">Loading…</div></div>
    <div class="sid-bot">
      <button class="del-btn" onclick="deleteMyAccount()">🗑 Delete My Account</button>
      <button class="admin-btn" onclick="deleteAllData()">⚙ admin</button>
    </div>
  </div>

  <div id="main">
    <div id="chat-placeholder">
      <div style="font-size:2.5rem;opacity:.3">💬</div>
      <div style="font-weight:600">Pick someone to chat with</div>
      <div style="font-size:.82rem;color:var(--text2)">tap 👥 to see friends</div>
    </div>
    <div id="chat-area">
      <div class="chat-top">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <div id="chat-av">?</div>
        <div id="chat-nm">...</div>
        <button class="call-btn-main" onclick="startVideoCall()">📹 Call</button>
      </div>
      <div id="msgs"></div>
      <div class="input-bar">
        <input id="msg-in" type="text" placeholder="Type a message…">
        <button class="send-btn" onclick="sendMessage()">
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>


<button id="open-btn" onclick="toggleSidebar()">👥</button>
<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getDatabase, ref, set, onValue, off, push, query, orderByChild, limitToLast, update } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAcmevlI-FqPB_biNZoPvLH2iyxTYoK3lc",
  authDomain: "dddd-b82bc.firebaseapp.com",
  databaseURL: "https://dddd-b82bc-default-rtdb.firebaseio.com",
  projectId: "dddd-b82bc",
  storageBucket: "dddd-b82bc.firebasestorage.app",
  messagingSenderId: "804910597236",
  appId: "1:804910597236:web:4c4b984f678e4dba4e7d21"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let myId=null, myName=null, currentChatId=null, chatListener=null, allUsers=[], lastMsgCount=0;

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function av(n){return n?n[0].toUpperCase():"?"}
function col(id){const c=["#7c6fff","#ff6fb0","#4fffb0","#ffb84f","#4fc3ff","#ff4f6f","#b4ff4f"];let h=0;for(let i=0;i<id.length;i++)h=id.charCodeAt(i)+((h<<5)-h);return c[Math.abs(h)%c.length]}
function timeAgo(ts){if(!ts)return"";const d=Date.now()-ts;if(d<60000)return"just now";if(d<3600000)return Math.floor(d/60000)+"m ago";return Math.floor(d/3600000)+"h ago"}
function chatId(a,b){return[a,b].sort().join("__")}
function showToast(msg){const e=document.getElementById("toast");e.textContent=msg;e.classList.add("show");setTimeout(()=>e.classList.remove("show"),3500)}
function showScreen(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active")}

window.checkGate=()=>{
  if(document.getElementById("gate-in").value==="1234"){
    showScreen("auth-screen");
    setTimeout(()=>document.getElementById("name-in").focus(),100);
  } else {
    document.getElementById("gate-err").textContent="❌ Wrong password!";
    document.getElementById("gate-in").value="";
    setTimeout(()=>document.getElementById("gate-err").textContent="",2000);
  }
};

window.joinChat=async()=>{
  const name=document.getElementById("name-in").value.trim();
  if(!name)return showToast("Enter your name!");
  myId=localStorage.getItem("blink_uid")||("u_"+Math.random().toString(36).substr(2,9)+Date.now().toString(36));
  myName=name;
  localStorage.setItem("blink_uid",myId);
  localStorage.setItem("blink_name",name);
  await set(ref(db,"users/"+myId),{name,uid:myId,online:true,lastSeen:Date.now()});
  enterApp();
};

window.leaveChat=async()=>{
  if(myId)await update(ref(db,"users/"+myId),{online:false});
  if(chatListener){off(chatListener);chatListener=null;}
  myId=null;myName=null;
  showScreen("auth-screen");
};

window.deleteMyAccount=async()=>{
  if(!confirm("Delete your account permanently?"))return;
  await set(ref(db,"users/"+myId),null);
  localStorage.removeItem("blink_uid");
  localStorage.removeItem("blink_name");
  location.reload();
};

window.deleteAllData=async()=>{
  if(!confirm("Delete ALL users and chats?"))return;
  if(!confirm("100% sure?"))return;
  await set(ref(db,"users"),null);
  await set(ref(db,"chats"),null);
  localStorage.removeItem("blink_uid");
  localStorage.removeItem("blink_name");
  location.reload();
};

function enterApp(){
  document.getElementById("my-nm").textContent=myName;
  document.getElementById("my-av").textContent=av(myName);
  document.getElementById("my-av").style.background=col(myId);
  showScreen("app-screen");
  if(Notification&&Notification.permission==="default")Notification.requestPermission();
  onValue(ref(db,"users"),snap=>{
    const data=snap.val()||{};
    allUsers=Object.values(data).filter(u=>u&&u.uid&&u.name&&u.uid!==myId);
    renderUsers("");
  });
}

window.filterUsers=val=>renderUsers(val.toLowerCase());

function renderUsers(filter){
  const list=document.getElementById("users-list");
  const filtered=filter?allUsers.filter(u=>u.name.toLowerCase().includes(filter)):allUsers;
  if(!filtered.length){list.innerHTML=`<div class="empty">${allUsers.length===0?"No one else here yet!":"No users found"}</div>`;return;}
  list.innerHTML=filtered.map(u=>`
    <div class="user-item" onclick="openChat('${u.uid}','${esc(u.name)}')" ontouchend="event.preventDefault();openChat('${u.uid}','${esc(u.name)}')">
      <div class="av" style="background:${col(u.uid)}">${av(u.name)}</div>
      <div class="u-info"><div class="u-name">${esc(u.name)}</div></div>
      <div class="dot ${u.online?"on":""}"></div>
    </div>`).join("");
}

window.openChat=(uid,name)=>{
  currentChatId=chatId(myId,uid);
  document.getElementById("chat-nm").textContent=name;
  document.getElementById("chat-av").textContent=av(name);
  document.getElementById("chat-av").style.background=col(uid);
  document.getElementById("chat-placeholder").style.display="none";
  document.getElementById("chat-area").style.display="flex";
  setTimeout(closeSidebar, 100);
  if(chatListener)off(chatListener);
  lastMsgCount=0;
  const msgsRef=query(ref(db,"chats/"+currentChatId+"/messages"),orderByChild("ts"),limitToLast(100));
  chatListener=onValue(msgsRef,snap=>{
    const msgs=Object.values(snap.val()||{}).sort((a,b)=>a.ts-b.ts);
    // Notifications for new messages
    if(msgs.length>lastMsgCount&&lastMsgCount>0){
      const m=msgs[msgs.length-1];
      if(m.uid!==myId){
        if(m.text&&m.text.startsWith("https://meet.no42.org")){
          if(confirm("📹 "+( m.name||"Friend")+" is calling! Join now?"))window.open(m.text,"_blank");
        } else if(document.hidden&&Notification.permission==="granted"){
          new Notification("💬 "+(m.name||"Friend"),{body:m.text});
        }
      }
    }
    lastMsgCount=msgs.length;
    renderMsgs(msgs);
  });
};

function renderMsgs(msgs){
  const box=document.getElementById("msgs");
  let html="",lastUid=null;
  for(const m of msgs){
    const mine=m.uid===myId;
    const showName=m.uid!==lastUid;lastUid=m.uid;
    const row=mine?"display:flex;justify-content:flex-end;margin:2px 0":"display:flex;justify-content:flex-start;margin:2px 0";
    const bubble=mine
      ?"background:#111;color:#fff;border:2px solid #444;border-radius:18px;border-bottom-right-radius:4px;padding:10px 16px;max-width:75%"
      :"background:#fff;color:#000;border:2px solid #ddd;border-radius:18px;border-bottom-left-radius:4px;padding:10px 16px;max-width:75%";
    const txt=mine?"color:#fff;word-break:break-word":"color:#000;font-weight:600;word-break:break-word";
    const time=mine?"font-size:.68rem;margin-top:4px;color:#aaa;text-align:right;font-family:monospace":"font-size:.68rem;margin-top:4px;color:#777;text-align:right;font-family:monospace";
    const ns=mine?"text-align:right;font-size:.68rem;font-weight:700;color:#7c6fff;margin-bottom:2px;font-family:monospace;text-transform:uppercase":"text-align:left;font-size:.68rem;font-weight:700;color:#ff6fb0;margin-bottom:2px;font-family:monospace;text-transform:uppercase";
    const msgContent=m.text&&m.text.startsWith("https://")?
      `<a href="${m.text}" target="_blank" style="color:#3effa0;word-break:break-all;">${m.text}</a><br><button onclick="window.open('${m.text}','_blank')" style="margin-top:8px;background:#3effa0;border:none;border-radius:8px;padding:10px 20px;font-weight:700;cursor:pointer;color:#000;font-size:1rem;">👆 Join Call</button>`
      :esc(m.text);
    html+=`<div style="margin-bottom:4px">${showName?`<div style="${ns}">${mine?"You":esc(m.name||"?")}</div>`:""}<div style="${row}"><div style="${bubble}"><div style="${txt}">${msgContent}</div><div style="${time}">${timeAgo(m.ts)}</div></div></div></div>`;
  }
  box.innerHTML=html;
  box.scrollTop=box.scrollHeight;
}

window.sendMessage=async()=>{
  const input=document.getElementById("msg-in");
  const text=input.value.trim();
  if(!text||!currentChatId)return;
  input.value="";
  await push(ref(db,"chats/"+currentChatId+"/messages"),{text,uid:myId,name:myName,ts:Date.now()});
};

window.startVideoCall=()=>{
  if(!currentChatId)return showToast("Open a chat first!");
  const room="blink"+currentChatId.replace("__","").substring(0,12);
  const url="https://meet.no42.org/join/"+room;
  push(ref(db,"chats/"+currentChatId+"/messages"),{text:url,uid:myId,name:myName,ts:Date.now()});
  window.open(url,"_blank");
};

window.toggleSidebar=()=>{
  const s=document.getElementById("sidebar");
  const o=document.getElementById("overlay");
  s.classList.toggle("open");
  o.style.display=s.classList.contains("open")?"block":"none";
};
window.closeSidebar=()=>{
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("overlay").style.display="none";
};

document.getElementById("msg-in").addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();window.sendMessage();}});
document.getElementById("gate-in").addEventListener("keydown",e=>{if(e.key==="Enter")window.checkGate();});
document.getElementById("name-in").addEventListener("keydown",e=>{if(e.key==="Enter")window.joinChat();});

// Auto rejoin
const sn=localStorage.getItem("blink_name"),si=localStorage.getItem("blink_uid");
if(sn&&si){myId=si;myName=sn;set(ref(db,"users/"+myId),{name:myName,uid:myId,online:true,lastSeen:Date.now()});enterApp();}
</script>
</body>
</html>
